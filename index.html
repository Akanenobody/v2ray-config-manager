<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V2Ray Config Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --border: #475569;
        }

        body.light-mode {
            --bg-primary: #f8fafc;
            --bg-secondary: #f1f5f9;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border: #cbd5e1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s ease;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 1.8rem;
            color: var(--accent);
        }

        .header-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .theme-toggle {
            background: var(--bg-card);
            border: 2px solid var(--border);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            border-color: var(--accent);
        }

        .logout-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        .card {
            background: var(--bg-secondary);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        input[type="text"], input[type="password"], textarea {
            flex: 1;
            min-width: 300px;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        textarea {
            min-height: 150px;
            font-family: 'Courier New', monospace;
            resize: vertical;
            width: 100%;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 2px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .config-list {
            display: grid;
            gap: 15px;
        }

        .config-item {
            background: var(--bg-card);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .config-item:hover {
            border-color: var(--accent);
            transform: translateX(-5px);
        }

        .config-content {
            flex: 1;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            word-break: break-all;
            color: var(--text-secondary);
        }

        .config-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-success {
            background: var(--success);
            color: white;
        }

        .badge-danger {
            background: var(--danger);
            color: white;
        }

        .badge-warning {
            background: var(--warning);
            color: white;
        }

        .ping-display {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 2px solid var(--border);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: var(--bg-card);
            border-radius: 8px;
            border: 2px solid var(--border);
        }

        .stats-item {
            text-align: center;
        }

        .stats-number {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent);
        }

        .stats-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-card {
            background: var(--bg-secondary);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--accent);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .form-group input {
            width: 100%;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid var(--danger);
            color: var(--danger);
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 2px solid var(--success);
            color: var(--success);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            padding: 30px;
            border-radius: 12px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            color: var(--accent);
        }

        .close-modal {
            background: var(--danger);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            header {
                flex-direction: column;
                gap: 15px;
            }

            .input-group {
                flex-direction: column;
            }

            input[type="text"] {
                min-width: 100%;
            }

            .config-item {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }

            .stats {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div id="loginSection" class="login-container">
        <div class="login-card">
            <h2>🔐 V2Ray Manager Login</h2>
            <div id="loginAlert"></div>
            <div class="form-group">
                <label>Username:</label>
                <input type="text" id="username" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>
            <button class="btn-primary" style="width: 100%;" onclick="login()">Login</button>
            <p style="text-align: center; margin-top: 20px; color: var(--text-secondary); font-size: 0.85rem;">
                Demo: admin/admin123 or user/pass123
            </p>
        </div>
    </div>

    <div id="appSection" style="display: none;">
        <div class="container">
            <header>
                <h1>📡 V2Ray Config Manager</h1>
                <div class="header-controls">
                    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </header>

            <div class="card">
                <h2 style="margin-bottom: 20px; color: var(--accent);">➕ Add Configuration</h2>
                <div class="input-group">
                    <input type="text" id="configInput" placeholder="Paste V2Ray config here..." />
                    <button class="btn-primary" onclick="addConfig()">Add Config</button>
                    <button class="btn-secondary" onclick="openMultiAddModal()">Add Multiple</button>
                </div>
            </div>

            <div class="stats">
                <div class="stats-item">
                    <div class="stats-number" id="configCount">0</div>
                    <div class="stats-label">Total Configs</div>
                </div>
                <div class="stats-item">
                    <div class="stats-number">100</div>
                    <div class="stats-label">Max Limit</div>
                </div>
            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="color: var(--accent);">📋 Your Configurations</h2>
                    <button class="btn-danger" onclick="clearAll()">Clear All</button>
                </div>
                <div id="configList" class="config-list"></div>
            </div>
        </div>
    </div>

    <!-- Multi-Add Modal -->
    <div id="multiAddModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📥 Add Multiple Configs</h3>
                <button class="close-modal" onclick="closeMultiAddModal()">✕</button>
            </div>
            <p style="margin-bottom: 15px; color: var(--text-secondary);">
                Paste multiple configs (one per line):
            </p>
            <textarea id="multiConfigInput" placeholder="vmess://...&#10;vless://...&#10;trojan://..."></textarea>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn-success" style="flex: 1;" onclick="addMultipleConfigs()">Add All</button>
                <button class="btn-secondary" onclick="closeMultiAddModal()">Cancel</button>
            </div>
            <p style="margin-top: 10px; color: var(--text-secondary); font-size: 0.85rem;">
                <span id="multiAddCount">0</span> configs detected
            </p>
        </div>
    </div>

    <script>
        const users = {
            'admin': 'admin123',
            'user': 'pass123'
        };

        let configs = [];
        const MAX_CONFIGS = 100;

        // Load saved data on page load
        window.onload = function() {
            loadTheme();
            loadConfigs();
            checkAuth();
        };

        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
                updateThemeIcon();
            }
        }

        function loadConfigs() {
            const savedConfigs = localStorage.getItem('v2ray_configs');
            if (savedConfigs) {
                configs = JSON.parse(savedConfigs);
                renderConfigs();
            }
        }

        function saveConfigs() {
            localStorage.setItem('v2ray_configs', JSON.stringify(configs));
            renderConfigs();
        }

        function checkAuth() {
            const isLoggedIn = sessionStorage.getItem('isLoggedIn');
            if (isLoggedIn === 'true') {
                showApp();
            }
        }

        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const alertDiv = document.getElementById('loginAlert');

            if (users[username] && users[username] === password) {
                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('username', username);
                alertDiv.innerHTML = '<div class="alert alert-success">✓ Login successful!</div>';
                setTimeout(showApp, 500);
            } else {
                alertDiv.innerHTML = '<div class="alert alert-error">✗ Invalid credentials!</div>';
            }
        }

        function logout() {
            sessionStorage.removeItem('isLoggedIn');
            sessionStorage.removeItem('username');
            document.getElementById('appSection').style.display = 'none';
            document.getElementById('loginSection').style.display = 'flex';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('loginAlert').innerHTML = '';
        }

        function showApp() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('appSection').style.display = 'block';
            renderConfigs();
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            updateThemeIcon();
            const theme = document.body.classList.contains('light-mode') ? 'light' : 'dark';
            localStorage.setItem('theme', theme);
        }

        function updateThemeIcon() {
            const btn = document.querySelector('.theme-toggle');
            btn.textContent = document.body.classList.contains('light-mode') ? '☀️' : '🌙';
        }

        function addConfig() {
            const input = document.getElementById('configInput');
            const config = input.value.trim();

            if (!config) {
                alert('❌ Please enter a config!');
                return;
            }

            if (configs.length >= MAX_CONFIGS) {
                alert(`❌ Maximum limit reached! (${MAX_CONFIGS} configs)`);
                return;
            }

            configs.push({
                id: Date.now(),
                config: config,
                ping: null
            });

            input.value = '';
            input.focus();
            saveConfigs();
        }

        function openMultiAddModal() {
            document.getElementById('multiAddModal').classList.add('active');
            document.getElementById('multiConfigInput').value = '';
            updateMultiAddCount();
        }

        function closeMultiAddModal() {
            document.getElementById('multiAddModal').classList.remove('active');
        }

        function updateMultiAddCount() {
            const textarea = document.getElementById('multiConfigInput');
            const lines = textarea.value.trim().split('\n').filter(line => line.trim() !== '');
            document.getElementById('multiAddCount').textContent = lines.length;
        }

        document.addEventListener('DOMContentLoaded', function() {
            const textarea = document.getElementById('multiConfigInput');
            if (textarea) {
                textarea.addEventListener('input', updateMultiAddCount);
            }
        });

        function addMultipleConfigs() {
            const textarea = document.getElementById('multiConfigInput');
            const lines = textarea.value.trim().split('\n').filter(line => line.trim() !== '');

            if (lines.length === 0) {
                alert('❌ Please enter at least one config!');
                return;
            }

            const remaining = MAX_CONFIGS - configs.length;
            if (lines.length > remaining) {
                alert(`❌ You can only add ${remaining} more configs (limit: ${MAX_CONFIGS})`);
                return;
            }

            let addedCount = 0;
            lines.forEach(line => {
                if (configs.length < MAX_CONFIGS) {
                    configs.push({
                        id: Date.now() + addedCount,
                        config: line.trim(),
                        ping: null
                    });
                    addedCount++;
                }
            });

            saveConfigs();
            closeMultiAddModal();
            alert(`✓ Added ${addedCount} configs successfully!`);
        }

        function deleteConfig(id) {
            if (confirm('Are you sure you want to delete this config?')) {
                configs = configs.filter(c => c.id !== id);
                saveConfigs();
            }
        }

        function copyConfig(config) {
            navigator.clipboard.writeText(config).then(() => {
                alert('✓ Config copied to clipboard!');
            });
        }

        async function pingTest(id) {
            const config = configs.find(c => c.id === id);
            if (!config) return;

            config.ping = 'testing';
            renderConfigs();

            // Simulate ping with random latency
            await new Promise(resolve => setTimeout(resolve, 1500));
            
            // Random ping between 20-500ms or timeout
            const success = Math.random() > 0.2;
            if (success) {
                config.ping = Math.floor(Math.random() * 480) + 20; // 20-500ms
            } else {
                config.ping = 'timeout';
            }
            
            saveConfigs();
        }

        function clearAll() {
            if (confirm(`Are you sure you want to delete all ${configs.length} configs?`)) {
                configs = [];
                saveConfigs();
            }
        }

        function getPingBadgeClass(ping) {
            if (ping === 'testing') return 'badge-warning';
            if (ping === 'timeout' || ping === null) return '';
            if (ping < 100) return 'badge-success';
            if (ping < 300) return 'badge-warning';
            return 'badge-danger';
        }

        function getPingDisplay(ping) {
            if (ping === 'testing') return '<span class="badge badge-warning">Testing...</span>';
            if (ping === 'timeout') return '<span class="badge badge-danger">Timeout</span>';
            if (ping === null) return '';
            
            const badgeClass = getPingBadgeClass(ping);
            return `<span class="badge ${badgeClass}">${ping}ms</span>`;
        }

        function renderConfigs() {
            const list = document.getElementById('configList');
            const countElement = document.getElementById('configCount');

            countElement.textContent = configs.length;

            if (configs.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 40px;">No configurations yet. Add your first config!</p>';
                return;
            }

            list.innerHTML = configs.map(item => `
                <div class="config-item">
                    <div class="config-content">${item.config.substring(0, 60)}...</div>
                    <div class="config-actions">
                        ${getPingDisplay(item.ping)}
                        <button class="btn-secondary" onclick="pingTest(${item.id})">🔍 Ping</button>
                        <button class="btn-primary" onclick="copyConfig('${item.config.replace(/'/g, "\\'")}')">📋 Copy</button>
                        <button class="btn-danger" onclick="deleteConfig(${item.id})">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        // Enter key support for login
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const loginSection = document.getElementById('loginSection');
                const appSection = document.getElementById('appSection');
                
                if (loginSection.style.display !== 'none') {
                    login();
                } else if (appSection.style.display !== 'none') {
                    const configInput = document.getElementById('configInput');
                    if (document.activeElement === configInput) {
                        addConfig();
                    }
                }
            }
        });
    </script>
</body>
</html>
